<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-sm" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.2" stroke-linecap="round"/>
    </marker>
    <style>
      .t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #1a1a1a; }
      .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; fill: #666; }
      .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14px" font-weight="500" fill="#1a1a1a">认知纤维丛 E → 语义流形 M</text>

  <!-- ========== 底流形 M (Base Manifold) ========== -->
  <path d="M60,300 C120,260 200,340 280,290 C360,240 420,320 500,280 C560,250 620,290 660,270"
        fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.7"/>
  <path d="M60,300 C120,260 200,340 280,290 C360,240 420,320 500,280 C560,250 620,290 660,270
           L660,310 C620,330 560,290 500,320 C420,360 360,280 280,330 C200,380 120,300 60,340 Z"
        fill="#f5f5f5" opacity="0.5"/>

  <!-- 底流形上的概念点 -->
  <circle cx="140" cy="282" r="5" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="140" y="268" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" fill="#1a1a1a">x₁</text>

  <circle cx="280" cy="290" r="5" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="280" y="276" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" fill="#1a1a1a">x₂</text>

  <circle cx="420" cy="296" r="5" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="420" y="282" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" fill="#1a1a1a">x₃</text>

  <circle cx="560" cy="272" r="5" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="560" y="258" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" fill="#1a1a1a">x_target</text>

  <text x="340" y="370" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" fill="#666">底流形 M（语义空间：每个点 = 一个概念/命题）</text>

  <!-- ========== 纤维 F_x ========== -->
  <line x1="280" y1="230" x2="280" y2="350" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="280" y1="290" x2="280" y2="248" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow-sm)" opacity="0.8"/>
  <text x="268" y="238" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#666">v ∈ T_x₂M</text>
  <line x1="280" y1="290" x2="302" y2="272" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arrow-sm)" opacity="0.6"/>
  <text x="316" y="266" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#666">w</text>

  <text x="230" y="218" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#888">纤维 F_x₂</text>
  <text x="230" y="232" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#888">（局部推理结构 / 切空间）</text>

  <!-- ========== 联络：x₁ → x₂ ========== -->
  <path d="M148,282 C180,260 240,270 272,284"
        fill="none" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.85"/>
  <text x="200" y="252" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" fill="#1a1a1a">∇（联络）</text>
  <text x="200" y="268" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#666">平行移动</text>

  <!-- ========== 推理链 ========== -->
  <path d="M288,292 C320,288 380,290 412,295"
        fill="none" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M428,294 C460,286 520,276 552,274"
        fill="none" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.7"/>

  <text x="340" y="420" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13px" font-weight="500" fill="#1a1a1a">推理链：x₁ → x₂ → x₃ → x_target</text>
  <text x="340" y="438" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" fill="#666">每步 = 沿联络在流形上移动</text>

  <!-- ========== Transformer 对应 ========== -->
  <rect x="480" y="380" width="190" height="118" rx="10" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="490" y="402" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13px" font-weight="500" fill="#1a1a1a">Transformer 对应</text>
  <text x="490" y="422" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#444">embedding  = 底流形上的点</text>
  <text x="490" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#444">attention    = 估计局部联络 ∇</text>
  <text x="490" y="458" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#444">残差连接    = 保持基点不变</text>
  <text x="490" y="476" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#444">多层叠加    = 沿流形走多步</text>

  <!-- ========== 左上角：公式 ========== -->
  <rect x="40" y="60" width="260" height="70" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="50" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" font-weight="500" fill="#1a1a1a">认知纤维丛：E</text>
  <text x="50" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#444">底流形：M（语义空间）</text>
  <text x="50" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" fill="#444">纤维：F_x（在 x 处的推理结构）</text>

  <line x1="40" y1="346" x2="640" y2="346" stroke="#ddd" stroke-width="0.5"/>
</svg>
